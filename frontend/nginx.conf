server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Todas las rutas dirigen a index.html (necesario para SPA/Astro routers)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché optimizada para archivos estáticos (imágenes, CSS, JS)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
