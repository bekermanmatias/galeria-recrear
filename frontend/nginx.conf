server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Todas las rutas dirigen a index.html (necesario para SPA/Astro routers)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Redirigir peticiones API al backend interno (evita abrir puertos extras en el VPS)
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Caché optimizada para archivos estáticos (imágenes, CSS, JS)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
